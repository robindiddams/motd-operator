# This rule is not used by the project motd-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the motd.motd.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: motd-operator
    app.kubernetes.io/managed-by: kustomize
  name: motd-editor-role
rules:
- apiGroups:
  - motd.motd.dev
  resources:
  - motds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - motd.motd.dev
  resources:
  - motds/status
  verbs:
  - get
